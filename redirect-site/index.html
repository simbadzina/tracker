<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Redirecting…</title>
    <!-- Fallback in case the _redirects rule is not applied (e.g. misconfigured publish dir). -->
    <meta http-equiv="refresh" content="0; url=https://simukira.duckdns.org/">
    <link rel="canonical" href="https://simukira.duckdns.org/">
    <script>window.location.replace("https://simukira.duckdns.org/" + window.location.search + window.location.hash);</script>
</head>
<body>
    <p>This has moved to <a href="https://simukira.duckdns.org/">simukira.duckdns.org</a>.</p>
</body>
</html>
